name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            runner: windows-latest
            scons_platform: windows
            scons_arch: x86_64
            zip_suffix: win64
          - name: linux
            runner: ubuntu-latest
            scons_platform: linux
            scons_arch: x86_64
            zip_suffix: linux-x86_64
          - name: macos
            runner: macos-latest
            scons_platform: macos
            scons_arch: universal
            zip_suffix: macos-universal
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: pip install --upgrade "scons>=4.0"

      - name: Build (template_release)
        run: scons platform=${{ matrix.scons_platform }} target=template_release arch=${{ matrix.scons_arch }} -j2

      - name: Build (template_debug)
        run: scons platform=${{ matrix.scons_platform }} target=template_debug arch=${{ matrix.scons_arch }} -j2

      - name: Resolve version string
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            v="${GITHUB_REF_NAME}"
          else
            v="snapshot-${GITHUB_SHA:0:7}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "version: $v"

      - name: Stage addon (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = "godot_terminal-$version"
          $stage_addon = "$stage/godot_terminal"
          New-Item -ItemType Directory -Path $stage_addon -Force | Out-Null
          Copy-Item -Recurse "demo/addons/godot_terminal/*" -Destination $stage_addon
          Copy-Item LICENSE "$stage/"
          Copy-Item README.md "$stage/"
          Get-ChildItem -Recurse $stage | Select-Object FullName

      - name: Stage addon (Unix)
        if: matrix.name != 'windows'
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          stage="godot_terminal-$version"
          stage_addon="$stage/godot_terminal"
          mkdir -p "$stage_addon"
          cp -R demo/addons/godot_terminal/. "$stage_addon/"
          cp LICENSE "$stage/"
          cp README.md "$stage/"
          find "$stage" -print

      - name: Zip (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = "godot_terminal-$version"
          $zip = "godot_terminal-$version-${{ matrix.zip_suffix }}.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          Get-Item $zip

      - name: Zip (Unix)
        if: matrix.name != 'windows'
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          stage="godot_terminal-$version"
          zip="godot_terminal-$version-${{ matrix.zip_suffix }}.zip"
          (cd "$stage" && zip -r "../$zip" .)
          ls -la "$zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot_terminal-${{ steps.version.outputs.version }}-${{ matrix.zip_suffix }}
          path: godot_terminal-*-${{ matrix.zip_suffix }}.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release on tag
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/godot_terminal-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
