name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write   # needed by softprops/action-gh-release on tag pushes
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: pip install --upgrade "scons>=4.0"

      - name: Build (template_release)
        run: scons platform=windows target=template_release arch=x86_64 -j2

      - name: Build (template_debug)
        run: scons platform=windows target=template_debug arch=x86_64 -j2

      - name: Resolve version string
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $v = $env:GITHUB_REF_NAME
          } else {
            $sha = $env:GITHUB_SHA.Substring(0, 7)
            $v = "snapshot-$sha"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "version: $v"

      - name: Stage addon
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = "godot_terminal-$version"
          $stage_addon = "$stage/godot_terminal"
          New-Item -ItemType Directory -Path $stage_addon -Force | Out-Null
          Copy-Item -Recurse "demo/addons/godot_terminal/*" -Destination $stage_addon
          Copy-Item LICENSE "$stage/"
          Copy-Item README.md "$stage/"
          # Sanity: list the staged tree.
          Get-ChildItem -Recurse $stage | Select-Object FullName

      - name: Zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stage = "godot_terminal-$version"
          $zip = "godot_terminal-$version-win64.zip"
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force
          "asset=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Get-Item $zip
        id: pack

      - name: Upload build artifact (every run)
        uses: actions/upload-artifact@v4
        with:
          name: godot_terminal-${{ steps.version.outputs.version }}-win64
          path: godot_terminal-*-win64.zip
          if-no-files-found: error
          retention-days: 14

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: godot_terminal-*-win64.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
